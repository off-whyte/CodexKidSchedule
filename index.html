    font-size: 0.9rem;
    font-weight: 700;

  .date {

  .card {

    padding: 20px;
    margin-bottom: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);

  .card-title {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--purple);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;

  .card-title .icon {
    font-size: 1.3rem;
  }

  /* Weather styles */
  .weather-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }

  .weather-time {
    text-align: center;
    padding: 12px 8px;
    background: var(--light-bg);
    border-radius: 12px;
  }

    font-size: 0.85rem;
    font-weight: 600;
    color: var(--purple);

  }

    font-size: 1.5rem;
    font-weight: 700;
  }

  .weather-time .feels-like {
    font-size: 0.8rem;
    color: var(--text-light);
    margin-top: 2px;

  .rain-info {

    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    background: #eef4fb;
    border-radius: 10px;
    font-size: 0.95rem;

  .rain-info .rain-icon {

  }

  .rain-chance-high {
    color: var(--rain-blue);
    font-weight: 600;
  }

  /* Lunch styles */
  .lunch-section {
    margin-bottom: 12px;
  }

  .lunch-section:last-child {
    margin-bottom: 0;
  }

  .lunch-section-title {
    font-size: 0.85rem;
    font-weight: 700;

    letter-spacing: 0.5px;

  .lunch-item {

    border-top: 1px solid #eee;

    color: var(--text-light);

  .error {

// ============================
// NO-SCHOOL DAYS (2025-2026)
// ============================
const NO_SCHOOL_DAYS = new Set([
  // Before school starts
  // First day of school: Aug 25, 2025
  '2025-09-01', // Labor Day
  '2025-09-29', // Staff PD
  '2025-10-13', // Fall Break / Columbus Day
  '2025-11-14', // P/T Comp Day
  '2025-11-26', // Thanksgiving Break
  '2025-11-27',
  '2025-11-28',
  '2025-12-22', // Winter Break
  '2025-12-23',
  '2025-12-24',
  '2025-12-25',
  '2025-12-26',
  '2025-12-29',
  '2025-12-30',
  '2025-12-31',
  '2026-01-01', // Winter Break cont.
  '2026-01-02', // Staff PD
  '2026-01-19', // MLK Jr Day
  '2026-02-02', // Staff PD
  '2026-02-16', // Presidents Day / Staff PD
  '2026-03-13', // P/T Comp Day
  '2026-03-16', // Spring Break
  '2026-03-17',
  '2026-03-18',
  '2026-03-19',
  '2026-03-20',
  '2026-04-23', // Staff PD
  '2026-04-24', // Break Day
  '2026-05-25', // Memorial Day
]);

const SCHOOL_YEAR_START = new Date(2025, 7, 25); // Aug 25, 2025
const SCHOOL_YEAR_END   = new Date(2026, 4, 29); // May 29, 2026

// Anchor: April 6, 2026 = Day 5
const ANCHOR_DATE = new Date(2026, 3, 6);
const ANCHOR_DAY  = 5;
let selectedDate = startOfDay(new Date());

// ============================
// DATE HELPERS
// ============================
function startOfDay(d) {
  return new Date(d.getFullYear(), d.getMonth(), d.getDate());
}

function addDays(d, days) {
  const next = new Date(d);
  next.setDate(next.getDate() + days);
  return startOfDay(next);
}

function toDateStr(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function isWeekday(d) {
  const dow = d.getDay();
  return dow !== 0 && dow !== 6;
}

function isSchoolDay(d) {
  if (!isWeekday(d)) return false;
  if (NO_SCHOOL_DAYS.has(toDateStr(d))) return false;
  if (d < SCHOOL_YEAR_START || d > SCHOOL_YEAR_END) return false;
  return true;
}

// ============================
// PROGRAM DAY CALCULATION
// ============================
function getProgramDay(targetDate) {
  const target = new Date(targetDate.getFullYear(), targetDate.getMonth(), targetDate.getDate());
  const anchor = new Date(ANCHOR_DATE);

  if (!isSchoolDay(target)) return null;

  let schoolDayDiff = 0;
  if (target >= anchor) {
    let d = new Date(anchor);
    d.setDate(d.getDate() + 1);
    while (d <= target) {
      if (isSchoolDay(d)) schoolDayDiff++;
      d.setDate(d.getDate() + 1);
    }
  } else {
    let d = new Date(target);
    d.setDate(d.getDate() + 1);
    while (d <= anchor) {
      if (isSchoolDay(d)) schoolDayDiff++;
      d.setDate(d.getDate() + 1);
    }
    schoolDayDiff = -schoolDayDiff;
  }

  // anchorDay is 5 (1-indexed), so offset = anchorDay - 1 = 4
  let dayNum = ((ANCHOR_DAY - 1 + schoolDayDiff) % 6 + 6) % 6 + 1;
  return dayNum;
}

// ============================
// FORMAT DATE
// ============================
function formatDate(d) {
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const nth = (n) => {
    if (n > 3 && n < 21) return 'th';
    switch (n % 10) { case 1: return 'st'; case 2: return 'nd'; case 3: return 'rd'; default: return 'th'; }
  };
  return `${days[d.getDay()]}, ${months[d.getMonth()]} ${d.getDate()}${nth(d.getDate())}`;
}

// ============================
// DISPLAY DATE & PROGRAM DAY
// ============================
function displayDateAndDay() {
  updateNavButtons();
  document.getElementById('todayDate').textContent = formatDate(selectedDate);

  const dayNum = getProgramDay(selectedDate);
  const pdEl = document.getElementById('programDay');
  const cycleEl = document.getElementById('dayCycle');

  if (dayNum === null) {
    // Check if it's a weekend or no-school day
    if (!isWeekday(selectedDate)) {
      pdEl.textContent = 'Weekend!';
      pdEl.className = 'program-day no-school';
      // Show what the NEXT school day will be
      showNextSchoolDay(cycleEl, selectedDate);
    } else if (selectedDate < SCHOOL_YEAR_START || selectedDate > SCHOOL_YEAR_END) {
      pdEl.textContent = 'No School';
      pdEl.className = 'program-day no-school';
      cycleEl.innerHTML = '';
    } else {
      pdEl.textContent = 'No School';
      pdEl.className = 'program-day no-school';
      showNextSchoolDay(cycleEl, selectedDate);
    }
  } else {
    pdEl.textContent = `Day ${dayNum}`;
    pdEl.className = 'program-day';

    // Render 6 dots
    let html = '';
    for (let i = 1; i <= 6; i++) {
      html += `<div class="day-dot ${i === dayNum ? 'active' : ''}">${i}</div>`;
    }
    cycleEl.innerHTML = html;
  }
}

function showNextSchoolDay(el, fromDate) {
  let d = new Date(fromDate);
  for (let i = 0; i < 30; i++) {
    d.setDate(d.getDate() + 1);
    if (isSchoolDay(d)) {
      const nextDay = getProgramDay(d);
      el.innerHTML = `<span style="font-size:0.85rem;color:var(--text-light);">Next school day: ${formatDate(d)} — Day ${nextDay}</span>`;
      return;
    }
  }
  el.innerHTML = '';
}

function updateNavButtons() {
  const today = startOfDay(new Date());
  const tomorrow = addDays(today, 1);
  document.querySelector('[onclick="changeDate(-1)"]').disabled = toDateStr(selectedDate) === toDateStr(today);
  document.querySelector('[onclick="changeDate(1)"]').disabled = toDateStr(selectedDate) === toDateStr(tomorrow);
}

// ============================
// WEATHER (Open-Meteo — free, no key needed)
// ============================

// Helper: fetch JSON with CORS-proxy fallback (needed for file:// context)
async function fetchJSON(url) {
  try {
    const res = await fetch(url);
    if (res.ok) return await res.json();
    throw new Error('status ' + res.status);
  } catch (e) {
    const res = await fetch('https://corsproxy.io/?url=' + encodeURIComponent(url));
    if (!res.ok) throw new Error('proxy failed');
    return await res.json();
  }
}

async function loadWeather() {
  const lat = 41.6731;
  const lon = -93.7196;
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=temperature_2m,apparent_temperature,precipitation_probability,precipitation&temperature_unit=fahrenheit&timezone=America/Chicago&forecast_days=2`;

  try {
    ['8', '12', '16'].forEach((id) => {
      document.getElementById(`temp${id}`).textContent = '--°';
      document.getElementById(`temp${id}`).classList.add('loading');
      document.getElementById(`feels${id}`).textContent = 'Feels --°';
    });

    const data = await fetchJSON(url);

    const targetStr = toDateStr(selectedDate);

    const hours = data.hourly.time;
    const temps = data.hourly.temperature_2m;
    const feelsLike = data.hourly.apparent_temperature;
    const rainProb = data.hourly.precipitation_probability;
    const precip = data.hourly.precipitation;

    // Find indices for 8am, 12pm, 4pm today
    const targetHours = [8, 12, 16];
    const ids = ['8', '12', '16'];

    targetHours.forEach((h, i) => {
      const timeStr = `${targetStr}T${String(h).padStart(2,'0')}:00`;
      const idx = hours.indexOf(timeStr);
      if (idx !== -1) {
        const t = Math.round(temps[idx]);
        const f = Math.round(feelsLike[idx]);
        document.getElementById(`temp${ids[i]}`).textContent = `${t}°`;
        document.getElementById(`temp${ids[i]}`).classList.remove('loading');
        document.getElementById(`feels${ids[i]}`).textContent = `Feels ${f}°`;
      }
    });

    // Rain analysis: find max rain chance and first rain hour today (6am-10pm)
    let maxRain = 0;
    let firstRainHour = null;
    for (let h = 6; h <= 22; h++) {
      const timeStr = `${targetStr}T${String(h).padStart(2,'0')}:00`;
      const idx = hours.indexOf(timeStr);
      if (idx !== -1) {
        if (rainProb[idx] > maxRain) maxRain = rainProb[idx];
        if (rainProb[idx] >= 30 && firstRainHour === null) {
          firstRainHour = h;
        }
      }
    }

    const rainEl = document.getElementById('rainText');
    const dateLabel = toDateStr(selectedDate) === toDateStr(new Date()) ? 'today' : 'that day';
    if (maxRain < 10) {
      rainEl.textContent = `${maxRain}% chance of rain — Looking dry ${dateLabel}!`;
      rainEl.classList.remove('loading');
    } else if (firstRainHour !== null) {
      const ampm = firstRainHour >= 12 ? 'pm' : 'am';
      const hr12 = firstRainHour > 12 ? firstRainHour - 12 : firstRainHour;
      rainEl.innerHTML = `<span class="rain-chance-high">${maxRain}% chance of rain</span> — possible starting around ${hr12}${ampm}`;
      rainEl.classList.remove('loading');
    } else {
      rainEl.textContent = `${maxRain}% chance of rain ${dateLabel}`;
      rainEl.classList.remove('loading');
    }

  } catch (err) {
    document.getElementById('rainText').textContent = 'Could not load weather data';
    document.getElementById('rainText').classList.remove('loading');
    document.getElementById('rainText').classList.add('error');
    console.error('Weather error:', err);
  }
}

function loadLunch() {
  const todayStr = toDateStr(selectedDate);
  const menuEl = document.getElementById('lunchMenu');
  const entry = LUNCH_DB[todayStr];

  if (!entry) {
    menuEl.innerHTML = '<div class="loading">No lunch data for this date. <a href="https://johnston.nutrislice.com/menu/wallace-elementary/lunch" target="_blank" style="color:var(--purple)">View on Nutrislice</a></div>';
    return;
  }

  let html = '';
  html += `<div class="lunch-section">`;
  html += `<div class="lunch-section-title">Main Entree</div>`;
  html += `<div class="lunch-item entree">${entry.m}</div>`;
  html += `</div>`;

  if (entry.s) {
    // Filter out the yogurt meal alternative (always available, not a daily side)
    // Yogurt meal package = Yogurt Yolite + Rockin'ola Granola + Dinner Roll
    const sides = entry.s.split(', ').filter(s =>
      !s.toLowerCase().includes('yogurt') &&
      !s.toLowerCase().includes('rockin\'ola granola') &&
      !s.toLowerCase().includes('dinner roll')
    );
    if (sides.length > 0) {
      html += `<div class="lunch-section">`;
      html += `<div class="lunch-section-title">Sides &amp; More</div>`;
      for (const side of sides) {
        html += `<div class="lunch-item">${side}</div>`;
      }
      html += `</div>`;
    }
  }

  html += `<div class="lunch-note">🍎 Variety fruit &amp; juice offered &nbsp;|&nbsp; 🥛 Milk included</div>`;
  menuEl.innerHTML = html;
}

function loadAll() {
  displayDateAndDay();
  loadWeather();
  loadLunch();
  document.getElementById('lastUpdated').textContent = `Updated ${new Date().toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'})}`;
}

function changeDate(offset) {
  const today = startOfDay(new Date());
  const tomorrow = addDays(today, 1);
  const nextDate = addDays(selectedDate, offset);
  if (nextDate < today || nextDate > tomorrow) return;
  selectedDate = nextDate;
  loadAll();
}

function goToToday() {
  selectedDate = startOfDay(new Date());
  loadAll();
}

// Start on page load
loadAll();
